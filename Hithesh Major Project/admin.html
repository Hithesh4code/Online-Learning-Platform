<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LearnHub | Admin</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <header class="site-header">
    <h1>LearnHub</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="courses.html">Courses</a>
      <a href="dashboard.html">My Courses</a>
      <span id="auth-slot"></span>
    </nav>
  </header>

  <main class="container">
    <section class="auth-card">
      <h2>Admin Panel</h2>
      <p class="meta">Add a new course or update existing course details.</p>
      <form id="admin-form" class="stack-form">
        <label>Course ID (use existing ID to edit)</label>
        <input id="admin-id" type="text" placeholder="ex: c5" required />
        <label>Title</label>
        <input id="admin-title" type="text" required />
        <label>Description</label>
        <textarea id="admin-description" rows="3" required></textarea>
        <label>Duration</label>
        <input id="admin-duration" type="text" placeholder="ex: 4 weeks" required />
        <label>Level</label>
        <select id="admin-level" required>
          <option value="Beginner">Beginner</option>
          <option value="Intermediate">Intermediate</option>
        </select>
        <label>YouTube Embed URL</label>
        <input id="admin-video" type="url" placeholder="https://www.youtube.com/embed/..." required />
        <label>Study Notes (one line per point)</label>
        <textarea id="admin-notes" rows="4" placeholder="Point 1&#10;Point 2&#10;Point 3" required></textarea>
        <label>Lessons (format: title|videoEmbedUrl, one per line)</label>
        <textarea id="admin-lessons" rows="6" placeholder="Intro|https://www.youtube.com/embed/..."></textarea>
        <button type="submit" class="btn">Save Course</button>
      </form>
      <p id="admin-message" class="meta"></p>
    </section>

    <section>
      <h3>Current Catalog</h3>
      <div id="admin-courses" class="dashboard-list"></div>
    </section>
  </main>

  <script type="module" src="assets/js/controllers/authGuard.js"></script>
  <script type="module" src="assets/js/controllers/adminController.js"></script>
  <script type="module" src="assets/js/controllers/layoutController.js"></script>
</body>
</html>
